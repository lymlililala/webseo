<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300..600,0,0&display=swap"
    />
    <link rel="icon" href="/favicon.ico" />

    <!-- Primary SEO -->
    <title>SGAIndex — SEO/GEO/AEO Tools Directory | AI Search Optimization</title>
    <meta
      name="description"
      content="A tools directory for the AI search era: 100+ curated SEO, GEO (Generative Engine Optimization), AEO (Answer Engine Optimization) and Schema structured-data tools to improve your visibility in Google and AI engines like ChatGPT and Perplexity."
    />
    <meta
      name="keywords"
      content="SEO tools,GEO optimization,AEO tools,AI search optimization,Schema structured data,llms.txt,ChatGPT SEO,Perplexity optimization"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SGAIndex" />

    <!-- Canonical — 默认指向首页，usePageSeo 在路由激活后会动态覆盖此值 -->
    <link rel="canonical" href="https://sgaindex.com" id="canonical-link" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SGAIndex" />
    <meta property="og:title" content="SGAIndex — SEO/GEO/AEO Tools Directory" />
    <meta
      property="og:description"
      content="A tools directory for the AI search era: 100+ curated SEO, GEO, AEO and Schema structured-data tools to improve visibility in Google and AI engines."
    />
    <meta property="og:url" content="https://sgaindex.com" />
    <meta property="og:image" content="https://sgaindex.com/og-default.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SGAIndex — SEO/GEO/AEO Tools Directory" />
    <meta
      name="twitter:description"
      content="A tools directory for the AI search era: 100+ curated tools to improve your visibility in Google and AI engines."
    />
    <meta name="twitter:image" content="https://sgaindex.com/og-default.png" />

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SGAIndex",
        "url": "https://sgaindex.com",
        "description": "A tools directory for the AI search era — SEO, GEO and AEO optimization",
        "logo": "https://sgaindex.com/favicon.ico",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "SGAIndex",
        "url": "https://sgaindex.com",
        "description": "A tools directory for the AI search era — SEO, GEO, AEO and Schema structured-data tools",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://sgaindex.com/seo-nav?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <style>
      /* Set vuestic higher priority over tailwind normalize css */
      @layer tailwind.base, vuestic;
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
